replicas: 1

# Use the same endpoint style as your Fluent Bit output.
# Replace with your DNS endpoint if needed (for example, es.yourdomain.com).
elasticsearchHosts: "http://elastic-svc:9200"

kibanaConfig:
  kibana.yml: |
    server.host: "0.0.0.0"
    elasticsearch.hosts: ["http://elastic-svc:9200"]
    xpack.security.enabled: false

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

service:
  type: NodePort
  port: 5601
  nodePort: 30005