clusterName: shreyank-elk
nodeGroup: master

replicas: 1
minimumMasterNodes: 1

masterService: ""

esConfig:
  elasticsearch.yml: |
    cluster.name: shreyank-elk
    network.host: 0.0.0.0
    discovery.type: single-node
    xpack.security.enabled: true
    xpack.security.transport.ssl.enabled: false
    xpack.security.http.ssl.enabled: false

protocol: http

extraEnvs:
  - name: discovery.type
    value: single-node
  - name: ES_JAVA_OPTS
    value: "-Xms512m -Xmx512m"
  - name: ELASTIC_PASSWORD
    value: "elasticsearchtest!"

roles:
  - master
  - data
  - data_content
  - data_hot
  - data_warm
  - data_cold
  - ingest
  - ml
  - remote_cluster_client
  - transform

esJavaOpts: "-Xms512m -Xmx512m"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

persistence:
  enabled: true
  labels:
    enabled: false
  annotations: {}

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi

service:
  type: NodePort
  nodePort: 30003
  port: 9200
  transportPort: 9300


sysctlInitContainer:
  enabled: false

antiAffinity: "soft"

clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"

readinessProbe:
  failureThreshold: 10
  initialDelaySeconds: 30
  periodSeconds: 10
  successThreshold: 3
  timeoutSeconds: 5

livenessProbe:
  failureThreshold: 10
  initialDelaySeconds: 60
  periodSeconds: 20
  timeoutSeconds: 5