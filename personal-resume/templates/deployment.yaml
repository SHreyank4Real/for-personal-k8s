apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  labels:
    app: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      containers:
        - name: resume
          image: {{ .Values.image.repository }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.container.port }}
          resources:
            requests:
              cpu: {{ .Values.container.cpuReq }}
              memory: {{ .Values.container.memoryReq }}
            limits:
              cpu: {{ .Values.container.cpuLim }}
              memory: {{ .Values.container.memoryLim }}
          # livenessProbe:
          #   httpGet:
          #     path: /
          #     port: {{ .Values.container.port }}
          #   initialDelaySeconds: 15
          #   periodSeconds: 10
          # readinessProbe:
          #   httpGet:
          #     path: /
          #     port: {{ .Values.container.port }}
          #   initialDelaySeconds: 15
          #   periodSeconds: 5