hostPathMounts: []

kind: DaemonSet

volumes:
  - name: etcmachineid
    emptyDir: {}

config:
  service: |
    [SERVICE]
        Flush        1
        Log_Level    info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name           tail
        Path           /var/log/containers/shreyank-resume-*.log
        Tag            nginx.logs
        Mem_Buf_Limit  5MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               nginx.logs
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name    grep
        Match   nginx.logs
        Exclude log /.*(kube-probe|HealthCheck|Health).*/

    [FILTER]
        Name         parser
        Match        nginx.logs
        Key_Name     log
        Parser       nginx
        Reserve_Data True

  outputs: |
    [OUTPUT]
        Name                es
        Match               nginx.logs
        Host                elastic-svc
        Port                9200
        Index               resume-logs
        Type                _doc
        Suppress_Type_Name  On
        Pipeline            geoip-info

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Wi

tolerations:
  - operator: Exists