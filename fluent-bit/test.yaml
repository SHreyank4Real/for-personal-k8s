hostPathMounts: []

kind: DaemonSet

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: etcmachineid
    emptyDir: {}

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: etcmachineid
    mountPath: /etc/machine-id
    readOnly: true

config:
  service: |
    [SERVICE]
        Flush        1
        Log_Level    info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name           tail
        Path           /var/log/containers/shreyank-resume-*.log
        Tag            kube.var.log.containers.shreyank-resume-*
        Tag_Regex      (?<pod_name>[a-z0-9](?:[-a-z0-9]*[a-z0-9])?(?:\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*)_(?<namespace_name>[^_]+)_(?<container_name>.+)-(?<docker_id>[a-z0-9]{64})\.log$
        Mem_Buf_Limit  5MB
        Skip_Long_Lines On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.var.log.containers.shreyank-resume-*
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name    grep
        Match   kube.var.log.containers.shreyank-resume-*
        Exclude log /.*(kube-probe|HealthCheck|Health).*/

    [FILTER]
        Name         parser
        Match        kube.var.log.containers.shreyank-resume-*
        Key_Name     log
        Parser       nginx
        Reserve_Data True

  outputs: |
    [OUTPUT]
        Name                es
        Match               kube.var.log.containers.shreyank-resume-*
        Host                elastic-svc
        Port                9200
        Logstash_Format     On
        Logstash_Prefix     resume-logs
        Logstash_DateFormat %m-%Y
        Type                _doc
        Suppress_Type_Name  On
        Pipeline            geoip-info

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

tolerations:
  - operator: Exists